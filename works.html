<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生作品 -薛老师家教介绍</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 页面专属样式 */
        .page-header { max-width: var(--max-width); margin: 0 auto; padding: 80px 20px 40px; }
        .page-title { font-size: clamp(32px, 4vw, 48px); font-weight: 700; margin-bottom: 16px; }
        .page-desc { font-size: 18px; color: var(--color-text-sub); }

        .works-grid {
            max-width: var(--max-width); margin: 0 auto; padding: 0 20px 80px;
            display: grid; grid-template-columns: 1fr; gap: 24px;
        }
        @media (min-width: 768px) { .works-grid { grid-template-columns: repeat(3, 1fr); padding: 0 40px 120px; } }

        .work-item { background: #FFF; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .work-item:hover { transform: translateY(-4px); }
        .work-item img { width: 100%; height: 200px; object-fit: cover; background: #EEE; }
        .work-info { padding: 20px; }
        .work-info h3 { font-size: 18px; margin-bottom: 8px; }
        .work-info p { font-size: 14px; color: var(--color-text-sub); }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title">🎨 学生作品</h1>
        <p class="page-desc">见证每一次进步与成长，这里是启发式教育结出的果实。</p>
    </header>

    <main class="works-grid">
        <!-- 作品 1 -->
        <article class="work-item">
            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=600&q=80" alt="创意画作">
            <div class="work-info">
                <h3>《星空下的思考》</h3>
                <p>初一学生 · 创意美术</p>
            </div>
        </article>
        <!-- 作品 2 -->
        <article class="work-item">
            <img src="https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=600&q=80" alt="满分作文">
            <div class="work-info">
                <h3>《时间的重量》</h3>
                <p>初二学生 · 语文满分作文</p>
            </div>
        </article>
        <!-- 作品 3 -->
        <article class="work-item">
            <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904?auto=format&fit=crop&w=600&q=80" alt="思维导图">
            <div class="work-info">
                <h3>《历史时间轴梳理》</h3>
                <p>初三学生 · 逻辑思维导图</p>
            </div>
        </article>
    </main>

    <footer class="contact-footer">
        <a href="index.html" class="btn btn-secondary">返回首页</a>
    </footer>
</body>
</html>
