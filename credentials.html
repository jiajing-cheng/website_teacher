<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资质荣誉 - 薛老师介绍</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header { max-width: var(--max-width); margin: 0 auto; padding: 80px 20px 40px; text-align: center; }
        .page-title { font-size: clamp(32px, 4vw, 48px); font-weight: 700; margin-bottom: 16px; }
        .page-desc { font-size: 18px; color: var(--color-text-sub); max-width: 600px; margin: 0 auto; }

        .credentials-box { max-width: 800px; margin: 0 auto; padding: 0 20px 80px; }
        @media (min-width: 768px) { .credentials-box { padding: 0 40px 120px; } }

        .cred-card { background: #FFF; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .cred-card ul { list-style: none; display: flex; flex-direction: column; gap: 20px; }
        .cred-card li { font-size: 18px; line-height: 1.6; padding-left: 24px; position: relative; }
        .cred-card li::before { content: "✓"; position: absolute; left: 0; color: var(--color-cta); font-weight: bold; }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title">🏆 资质荣誉</h1>
        <p class="page-desc">专业认证与教学成果背书，用实力与口碑为您孩子的学习保驾护航。</p>
    </header>

    <main class="credentials-box">
        <div class="cred-card">
            <ul>
                <li>985高校教育学硕士，7年一线个性化辅导经验</li>
                <li>初级中学教师资格证（数学证）</li>
                <li>累计辅导超过 100+ 名学生，平均提分 20% 以上</li>
                <li>自主研发“极简启发式”学习法，获家长一致好评</li>
            </ul>
        </div>
    </main>

    <footer class="contact-footer">
        <a href="index.html" class="btn btn-secondary">返回首页</a>
    </footer>
</body>
</html>
